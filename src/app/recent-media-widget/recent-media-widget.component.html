<mat-card class="fill-grid-item" appearance="outlined" *transloco="let t">
    <mat-card-header>
        <mat-icon mat-card-avatar>video_library</mat-icon>
        <mat-card-title>{{ t('form.recent_media') }}</mat-card-title>
    </mat-card-header>

    <mat-card-content>
        <mat-list>
            @for (item of viewData; track item.file_id) {
            <mat-list-item>
                @if (item.preview) {
                <img matListItemAvatar src="/api/media/item/preview/{{item.file_id}}" alt="Item Preview">
                } @else {
                <mat-icon matListItemAvatar>movie</mat-icon>
                }

                <span matListItemTitle>{{item.folder_name}}</span>

                <span matListItemLine class="item-meta">
                    <span>{{item.name}}</span>
                    <span>{{item.progress}}%</span>
                    <span>{{item.timestamp | formatDate}}</span>
                </span>

                <span matListItemMeta class="item-actions">
                    <a mat-icon-button [routerLink]="['/a-media', 'browse', item.folder_id]"
                        [title]="t('action.view')">
                        <mat-icon>folder</mat-icon>
                    </a>
                    <button mat-icon-button (click)="itemClicked(item)"
                        [title]="t('action.preview')">
                        <mat-icon>play_arrow</mat-icon>
                    </button>
                </span>
            </mat-list-item>
            <mat-divider></mat-divider>
            } @empty {
            <mat-list-item>
                <span matListItemTitle>{{ t('form.no_data') }}</span>
            </mat-list-item>
            }
        </mat-list>
    </mat-card-content>

    <mat-card-footer>
        <mat-paginator [length]="totalItems" [pageSize]="6" [pageSizeOptions]="[6]"
            [pageIndex]="pageIndex" (page)="onPageChange($event)"
            [hidePageSize]="true" [showFirstLastButtons]="false"
            aria-label="Recent navigation">
        </mat-paginator>
    </mat-card-footer>
</mat-card>
