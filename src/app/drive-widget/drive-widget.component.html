<mat-card class="fill-grid-item" appearance="outlined" *transloco="let t">
    <mat-card-header>
        <mat-icon mat-card-avatar>storage</mat-icon>
        <mat-card-title>{{ t('form.storage_overview') }}</mat-card-title>
    </mat-card-header>

    <mat-card-content>
        <mat-list>
            @for (driveInfo of drives; track driveInfo.device) {
            <mat-list-item>
                <mat-progress-spinner matListItemAvatar
                    class="space_overview"
                    [mode]="'determinate'"
                    [diameter]="40"
                    [value]="driveInfo.percent">
                </mat-progress-spinner>

                <span matListItemTitle>{{driveInfo.device}}</span>

                <span matListItemLine class="drive-percent">
                    {{driveInfo.used | byteFormat}} / {{driveInfo.total | byteFormat}} used &nbsp;·&nbsp; {{driveInfo.free | byteFormat}} free &nbsp;·&nbsp; {{driveInfo.percent}}%
                </span>
            </mat-list-item>
            <mat-divider></mat-divider>
            } @empty {
            <mat-list-item>
                <span matListItemTitle>{{ t('form.no_data') }}</span>
            </mat-list-item>
            }
        </mat-list>
    </mat-card-content>
</mat-card>
