<ng-container *transloco="let t">
  <div class="overlay-container no-zoom" [class.full-screen]="isFullScreen" cdkDrag
    cdkDragBoundary="media-overlay-panel">

    <!-- Title bar — drag handle -->
    <mat-toolbar color="primary" cdkDragHandle class="overlay-titlebar">
      <span class="title">{{ videoFile?.name }}</span>
      <span class="spacer"></span>
      <button mat-icon-button (click)="toggleFullScreen()" [title]="isFullScreen ? t('action.exit_fullscreen') : t('action.fullscreen')">
        <mat-icon>{{ isFullScreen ? 'fullscreen_exit' : 'fullscreen' }}</mat-icon>
      </button>
      <button mat-icon-button (click)="close()" [title]="t('action.close')">
        <mat-icon>close</mat-icon>
      </button>
    </mat-toolbar>

    <!-- Media content -->
    <div class="overlay-content">
      <div class="video-container">
        @if (videoSourceUrl) {
          <video #videoPlayer autoplay controls playsinline webkit-playsinline x-webkit-airplay="allow"
            (play)="onVideoPlay()" (pause)="onVideoPause()" (ended)="onVideoEnd()" (loadedmetadata)="onMetadataLoaded()">
            <source [src]="videoSourceUrl" type="video/mp4" />
          </video>
        }
        @if (audioSourceUrl) {
          <audio #audioPlayer autoplay controls (ended)="onAudioFinished()">
            <source [src]="audioSourceUrl" type="audio/mpeg" />
          </audio>
        }
        @if (imageSourceUrl) {
          <img class="image-player" [src]="imageSourceUrl" />
        }
        @if (textSourceUrl) {
          <textarea id="text-preview" readonly [value]="textContent"></textarea>
        }
      </div>
    </div>

    <!-- Footer controls -->
    <mat-toolbar color="primary" class="overlay-footer">

      <!-- Navigation -->
      <button mat-icon-button (click)="prevVideo()" [title]="t('action.previous_item')">
        <mat-icon>skip_previous</mat-icon>
      </button>

      <!-- Randomness group -->
      <button mat-icon-button (click)="shuffle()" [title]="t('action.random_file')">
        <mat-icon>shuffle</mat-icon>
      </button>

      @if (videoSourceUrl) {
        <button mat-icon-button (click)="toggleChaosMode('normal')" [title]="t('action.self_shuffle')"
          [class.chaos-active]="chaosMode === 'normal'" #chaosBtn>
          <mat-icon>{{ chaosMode === 'normal' ? 'flash_on' : 'flash_off' }}</mat-icon>
        </button>
        <button mat-icon-button (click)="toggleChaosMode('quick')" [title]="t('action.self_shuffle_quick')"
          [class.chaos-active]="chaosMode === 'quick'">
          <mat-icon>bolt</mat-icon>
        </button>
      }

      <!-- Playback mode -->
      <button mat-icon-button [matMenuTriggerFor]="endModeMenu" [title]="t('action.playback_mode')">
        <mat-icon>{{ endMode === 'repeat' ? 'repeat_one' : endMode === 'random' ? 'shuffle_on' : 'queue_music' }}</mat-icon>
      </button>
      <mat-menu #endModeMenu="matMenu">
        <button mat-menu-item (click)="setEndMode('next')">
          <mat-icon>{{ endMode === 'next' ? 'check' : '' }}</mat-icon>
          <span>{{ t('action.next_item') }}</span>
        </button>
        <button mat-menu-item (click)="setEndMode('random')">
          <mat-icon>{{ endMode === 'random' ? 'check' : '' }}</mat-icon>
          <span>{{ t('action.random') }}</span>
        </button>
        <button mat-menu-item (click)="setEndMode('repeat')">
          <mat-icon>{{ endMode === 'repeat' ? 'check' : '' }}</mat-icon>
          <span>{{ t('action.repeat') }}</span>
        </button>
      </mat-menu>

      <span class="spacer"></span>

      <!-- Navigation -->
      <button mat-icon-button (click)="nextVideo()" [title]="t('action.next_item')">
        <mat-icon>skip_next</mat-icon>
      </button>

      <!-- Overflow: manage + unlock -->
      <button mat-icon-button [matMenuTriggerFor]="moreMenu" [title]="t('action.sub_menu')">
        <mat-icon>more_vert</mat-icon>
      </button>
      <mat-menu #moreMenu="matMenu">
        @if (videoSourceUrl) {
          <button mat-menu-item (click)="toogleUnsafeMode()">
            <mat-icon>{{ unsafeMode ? 'lock' : 'lock_open' }}</mat-icon>
            <span>{{ t(unsafeMode ? 'action.safe_stream' : 'action.unsafe_stream') }}</span>
          </button>
          <mat-divider></mat-divider>
        }
        @if (can_manage) {
          <button mat-menu-item (click)="deleteFile()" class="warn-item">
            <mat-icon>delete</mat-icon>
            <span>{{ t('action.delete_file') }}</span>
          </button>
        }
      </mat-menu>

    </mat-toolbar>
  </div>
</ng-container>
