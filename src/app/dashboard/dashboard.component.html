<ng-container *transloco="let t">
<mat-toolbar color="accent">
    <mat-toolbar-row>
        <span style="font-weight: bold;">{{ t('app.title') }}</span>
        <span class="toolbar-spacer"></span>

        <button mat-icon-button [matMenuTriggerFor]="widgetMenu"
            [title]="t('action.customize_dashboard')"
            [matBadge]="hiddenCount"
            [matBadgeHidden]="!anyHidden"
            matBadgeColor="warn"
            matBadgeSize="small">
            <mat-icon>dashboard_customize</mat-icon>
        </button>
    </mat-toolbar-row>
</mat-toolbar>

<mat-menu #widgetMenu="matMenu">
    <div class="widget-menu-header" (click)="$event.stopPropagation()">
        {{ t('action.customize_dashboard') }}
    </div>
    <mat-divider></mat-divider>

    @if (showBooks) {
        <button mat-menu-item (click)="$event.stopPropagation(); visibility.books = !visibility.books; saveVisibility()">
            <mat-icon>{{ visibility.books ? 'visibility' : 'visibility_off' }}</mat-icon>
            <span>{{ t('widget.recent_books') }}</span>
        </button>
    }
    @if (showMedia) {
        <button mat-menu-item (click)="$event.stopPropagation(); visibility.media = !visibility.media; saveVisibility()">
            <mat-icon>{{ visibility.media ? 'visibility' : 'visibility_off' }}</mat-icon>
            <span>{{ t('widget.recent_media') }}</span>
        </button>
    }
    @if (showDrives) {
        <button mat-menu-item (click)="$event.stopPropagation(); visibility.drives = !visibility.drives; saveVisibility()">
            <mat-icon>{{ visibility.drives ? 'visibility' : 'visibility_off' }}</mat-icon>
            <span>{{ t('widget.drives') }}</span>
        </button>
    }
</mat-menu>

<div class="widgets">
    <mat-grid-list [cols]="numberOfColumns" rowHeight="600px" [gutterSize]="'10px'">

        @if (authenticated && showBooks && visibility.books) {
            <mat-grid-tile>
                <app-recent-volume-widget></app-recent-volume-widget>
            </mat-grid-tile>
        }
        @if (authenticated && showMedia && visibility.media) {
            <mat-grid-tile>
                <app-recent-media-widget></app-recent-media-widget>
            </mat-grid-tile>
        }
        @if (authenticated && showDrives && visibility.drives) {
            <mat-grid-tile>
                <app-drive-widget></app-drive-widget>
            </mat-grid-tile>
        }

    </mat-grid-list>
</div>
</ng-container>
