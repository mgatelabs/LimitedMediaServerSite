<mat-sidenav-container>
    <mat-sidenav #drawer mode="over">
        <ng-template [cdkPortalOutlet]="isSmall ? contentPortal : null"></ng-template>
    </mat-sidenav>

    <mat-sidenav-content>
        <mat-toolbar [color]="color">
            <button mat-icon-button *ngIf="isSmall" (click)="drawer.toggle()">
                <mat-icon>menu</mat-icon>
            </button>

            <ng-template [cdkPortalOutlet]="!isSmall ? contentPortal : null"></ng-template>
        </mat-toolbar>

        <ng-content></ng-content>
    </mat-sidenav-content>
</mat-sidenav-container>
